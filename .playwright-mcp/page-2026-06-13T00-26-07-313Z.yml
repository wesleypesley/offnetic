                - generic [ref=e339]:
                  - 'heading "Google APIs for Mobile: Quickstarts" [level=1] [ref=e340]'
                  - 'link "Permalink: Google APIs for Mobile: Quickstarts" [ref=e341] [cursor=pointer]':
                    - /url: "#google-apis-for-mobile-quickstarts"
                    - img [ref=e342]
                - paragraph [ref=e344]:
                  - text: Demonstrates streaming audio with the
                  - link "Nearby.Connections API" [ref=e345] [cursor=pointer]:
                    - /url: https://developers.google.com/nearby/connections/overview
                  - text: to other nearby devices.
                - generic [ref=e346]:
                  - heading "Getting Started" [level=2] [ref=e347]
                  - 'link "Permalink: Getting Started" [ref=e348] [cursor=pointer]':
                    - /url: "#getting-started"
                    - img [ref=e349]
                - paragraph [ref=e351]: This sample uses the Gradle build system. To build this project, import the project into Android Studio before running it on (at least) 2 devices. This project comes with 2 build variants, Manual and Automatic, that demonstrate different ways of connecting the two devices. They can be toggled between in the Build Variants tab within Android Studio.
                - generic [ref=e352]:
                  - heading "WalkieTalkie Manual" [level=2] [ref=e353]
                  - 'link "Permalink: WalkieTalkie Manual" [ref=e354] [cursor=pointer]':
                    - /url: "#walkietalkie-manual"
                    - img [ref=e355]
                - paragraph [ref=e357]: In the manual build variant, shake one device to begin advertising. As long as the app is open, other nearby devices should connect to it shortly. To speak, hold down the volume keys and your voice will be transmitted to the other devices you have connected to.
                - paragraph [ref=e358]: This demonstrates a star network, where one device advertises to a group of devices nearby.
                - generic [ref=e359]:
                  - heading "WalkieTalkie Automatic" [level=2] [ref=e360]
                  - 'link "Permalink: WalkieTalkie Automatic" [ref=e361] [cursor=pointer]':
                    - /url: "#walkietalkie-automatic"
                    - img [ref=e362]
                - paragraph [ref=e364]: In the automatic build variant, devices simultaneously advertise and discover. Devices will begin to pair up as they connect to the first device they see. To speak, hold down the volume keys and your voice will be transmitted to the paired device.
                - paragraph [ref=e365]: This demonstrates a point to point network, where one device transmits a high bandwidth Payload to one other device.
