            - generic [ref=e148]:
              - region "Page Summary" [ref=e149]:
                - button "Page Summary" [ref=e150] [cursor=pointer]:
                  - img "Spark icon" [ref=e151]
                  - heading "Page Summary" [level=2] [ref=e153]
                  - generic: expand_more
              - paragraph [ref=e154]: Nearby Connections supports different strategies for advertising and discovery. The best strategy to use depends on the use case.
              - 'heading "Cluster Copy link to this section: Cluster" [level=2] [ref=e155]':
                - heading "Cluster" [level=2] [ref=e156]
                - 'button "Copy link to this section: Cluster" [ref=e157] [cursor=pointer]': link
              - paragraph [ref=e158]: The cluster strategy is a peer-to-peer strategy that supports an M-to-N, or cluster-shaped, connection topology. In other words, this enables connecting amorphous clusters of devices within radio range (~100m), where each device can both initiate outgoing connections to M other devices and accept incoming connections from N other devices.
              - paragraph [ref=e159]: This strategy is more flexible in its topology constraints than the star strategy, but results in lower bandwidth connections. It is good for use cases with smaller payloads that require a more mesh-like experience, such as multiplayer gaming.
              - 'heading "Star Copy link to this section: Star" [level=2] [ref=e160]':
                - heading "Star" [level=2] [ref=e161]
                - 'button "Copy link to this section: Star" [ref=e162] [cursor=pointer]': link
              - paragraph [ref=e163]: The star strategy is a peer-to-peer strategy that supports a 1-to-N, or star-shaped, connection topology. In other words, this enables connecting devices within radio range (~100m) in a star shape, where each device can, at any given time, play the role of either a hub (where it can accept incoming connections from N other devices), or a spoke (where it can initiate an outgoing connection to a single hub), but not both.
              - paragraph [ref=e164]: This strategy lends itself best to situations where there is one device advertising, and N devices which discover the advertiser, though you may still advertise and discover simultaneously if required.
              - paragraph [ref=e165]: This strategy is more strict in its topology constraints than the cluster strategy, but results in higher bandwidth connections. It is good for high-bandwidth use cases such as sharing a video to a group of friends.
              - heading "Point-to-Point" [level=2] [ref=e166]
              - paragraph [ref=e167]: The point-to-point strategy is a peer-to-peer strategy that supports a 1-to-1 connection topology. In other words, this enables connecting devices within radio range (~100m) with the highest possible throughput, but does not allow for more than a single connection at a time.
              - paragraph [ref=e168]: This strategy lends itself best to situations where transferring data is more important than the flexibility of maintaining multiple connections.
              - paragraph [ref=e169]: This strategy is more strict in its topology constraints than the star strategy, but results in higher bandwidth connections. It is good for high-bandwidth use cases such as sharing a large video to another device.
